name: chatapp
description: A modern real-time chat application built with Flutter and Supabase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Backend
  supabase_flutter: ^2.5.0

  # Calls (ZegoCloud)
  zego_uikit_prebuilt_call: ^4.23.0

  # State management
  provider: ^6.1.2

  # Secure local storage (permanent session)
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.3.2

  # Media
  image_picker: ^1.1.2
  file_picker: ^10.3.8
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.3
  open_filex: ^4.4.0
  url_launcher: ^6.3.0
  emoji_picker_flutter: ^4.4.0
  permission_handler: ^12.0.1
  mime: ^1.0.5
  timeago: ^3.7.0
  http: ^1.2.1

  # Offline cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network
  connectivity_plus: ^6.0.3

  # Contacts & media
  flutter_contacts: ^1.1.6+1
  audioplayers: ^6.1.0

  # Notifications
  onesignal_flutter: ^5.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
